<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory App</title>
</head>
<body>
    <section class="start-page">
        <section class="start-screen">
            <p class="start-screen__text">It's play time.</p>
            <h1 class="start-screen__headline">Ready to play?</h1>
        </section>
        <button class="btn btn-play">
            <img class="btn-play__img" src="/assets/img/startscreen/stadia_controller.svg" alt="">
            <p class="btn-play__text">Play</p>
            <img class="btn-play__arrow" src="/assets/img/startscreen/arrow_right.svg" alt="">
            <img class="btn-play__arrow--hidden" src="/assets/img/startscreen/arrow_bg.svg" alt="">
        </button>
        <img src="/assets/img/startscreen/stadia_controller_background.svg" alt="">
    </section>
    
    
    <script type="module" src="/src/main.ts"></script>    
</body>
</html>
