<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momory App</title>
</head>

<body class="alignment">
    <main class="game-board">
        
    </main>
    <div data-action="close" class="overlay ">

        </section>
    </div>

    <script type="module" src="src/main.ts"></script>
    <script type="module" src="/src/games.ts" defer></script>
