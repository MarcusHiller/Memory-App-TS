<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momory App</title>
</head>

<body class="theme__code alignment">
    <main class="game-board">
        <header class="display-field" >
            <div class="game-info">
                <section class="display-player">
                    <div class="display-player">
                        <img src="assets/img/game/label_blue.svg" alt="">
                        <p>player one</p>
                        <span>0</span>
                    </div>
                    <div class="display-player">
                        <img src="assets/img/game/label_orange.svg" alt="">
                        <p>player one</p>
                        <span>0</span>
                    </div>
                </section>
                <div class="display-player">
                    <p>Current Player</p>
                    <img src="assets/img/game/label_blue.svg" alt="">
                </div>
            </div>
            <div>
                <button class="btn btn-exit">
                    <img class="btn-exit__img" src="assets/img/game/exit_item.svg" alt="">
                    <p class="btn-exit__text">Exit game</p>
                </button>
            </div>
        </header>
        <section class="playing-field">
            <div class="card">
                <img src="assets/img/game/da_logo.svg" alt="">
            </div>
        </section>
    </main>
    <script type="module" src="src/main.ts"></script>
</body>

</html>
