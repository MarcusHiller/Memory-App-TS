<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory App</title>
</head>

<body class="body-setting">
    <main class="main-content">
        <header class="headline">
            <h2 class="headline__title">Settings</h2>
            <img class="headline__img" src="assets/img/settings/underline_yellow.svg" alt="">
        </header>

        <section class="setting">
            <div class="setting-list">
                <div class="setting-list__header">
                    <img class="setting-list__img" src="assets/img/settings/palette.svg" alt="">
                    <h4 class="setting-list__title">Game themes</h4>
                </div>
                <ul class="setting-list__content">
                    <li class="">
                        <label class="setting-element__input-field" for="radio">
                            <img class="setting-element__circle-img" src="assets/img/settings/circle_empty.svg" alt="field is not enabled">
                            <img class="setting-element__circle-img--disabled" src="assets/img/settings/circle_aktiv.svg" alt="field is selected">
                            <span class="setting-element__text--disabled">Code vibes theme</span>
                            <img class="setting-element__img-flag--disabled" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="">
                        <label class="setting-element__input-field" for="radio">
                            <img class="setting-element__circle-img" src="assets/img/settings/circle_empty.svg" alt="field is not enabled">
                            <img class="setting-element__circle-img--disabled" src="assets/img/settings/circle_aktiv.svg" alt="field is selected">
                            <span class="setting-element__text--disabled">Gaming theme</span>
                            <img class="setting-element__img-flag--disabled" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="">
                        <label class="setting-element__input-field" for="radio">
                            <img class="setting-element__circle-img" src="assets/img/settings/circle_empty.svg" alt="field is not enabled">
                            <img class="setting-element__circle-img--disabled" src="assets/img/settings/circle_aktiv.svg" alt="field is selected">
                            <span class="setting-element__text--disabled">DA Projects theme</span>
                            <img class="setting-element__img-flag--disabled" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-element">
                        <label class="setting-element__input-field" for="radio">
                            <img class="setting-element__circle-img" src="assets/img/settings/circle_empty.svg" alt="field is not enabled">
                            <img class="setting-element__circle-img--disabled" src="assets/img/settings/circle_aktiv.svg" alt="field is selected">
                            <span class="setting-element__text--disabled">Foods theme</span>
                            <img class="setting-element__img-flag--disabled" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                </ul>
            </div>
            <img class="img-themse" src="assets/img/settings/themes_example.svg" alt="Preview of the topic">
        </section>

        <aside class="player-settings">
            <div class="setting-list">
                <div class="setting-list__header">
                    <img class="setting-list__img" src="assets/img/settings/chess_pawn.svg" alt="">
                    <h4 class="setting-list__title">Choose player</h4>
                </div>
                <ul class="setting-list__content">
                    <li class="setting-element">
                        <label class="setting-element__input-field" for="radio">
                            <img class="setting-element__circle-img" src="assets/img/settings/circle_empty.svg" alt="field is not enabled">
                            <img class="setting-element__circle-img--disabled" src="assets/img/settings/circle_aktiv.svg" alt="field is selected">
                            <span class="setting-element__text--disabled">orange</span>
                            <img class="setting-element__img-flag--disabled" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-element">
                        <label class="setting-element__input-field" for="radio">
                            <img class="setting-element__circle-img" src="assets/img/settings/circle_empty.svg" alt="field is not enabled">
                            <img class="setting-element__circle-img--disabled" src="assets/img/settings/circle_aktiv.svg" alt="field is selected">
                            <span class="setting-element__text--disabled">blue</span>
                            <img class="setting-element__img-flag--disabled" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                </ul>
            </div>
            <div class="setting-list">
                <div class="setting-list__header">
                    <img class="setting-list__img" src="assets/img/settings/style.svg" alt="">
                    <h4 class="setting-list__title">Border size</h4>
                </div>
                <ul class="setting-list__content">
                    <li class="setting-element">
                        <label class="setting-element__input-field" for="radio">
                            <img class="setting-element__circle-img" src="assets/img/settings/circle_empty.svg" alt="field is not enabled">
                            <img class="setting-element__circle-img--disabled" src="assets/img/settings/circle_aktiv.svg" alt="field is selected">
                            <span class="setting-element__text--disabled">16 cards</span>
                            <img class="setting-element__img-flag--disabled" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-element">
                        <label class="setting-element__input-field" for="radio">
                            <img class="setting-element__circle-img" src="assets/img/settings/circle_empty.svg" alt="field is not enabled">
                            <img class="setting-element__circle-img--disabled" src="assets/img/settings/circle_aktiv.svg" alt="field is selected">
                            <span class="setting-element__text--disabled">24 cards</span>
                            <img class="setting-element__img-flag--disabled" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-element">
                        <label class="setting-element__input-field" for="radio">
                            <img class="setting-element__circle-img" src="assets/img/settings/circle_empty.svg" alt="field is not enabled">
                            <img class="setting-element__circle-img--disabled" src="assets/img/settings/circle_aktiv.svg" alt="field is selected">
                            <span class="setting-element__text--disabled">32 cards</span>
                            <img class="setting-element__img-flag--disabled" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                </ul>
            </div>
        </aside>

        <footer class="game-play">
            <p class="game-play__text">Game themes</p>
            <img class="game-play__img" src="assets/img/settings/border_yellow.svg" alt="">
            <p class="game-play__text">Player</p>
            <img class="game-play__img" src="assets/img/settings/border_yellow.svg" alt="">
            <p class="game-play__text">Bord size</p>
            <button id="play-game" class="btn btn-start btn-start--disabled">
                <img class="btn-start__img" src="assets/img/settings/small_play.svg" alt="">
                <p class="btn-start__text">Start</p>
            </button>
        </footer>
    </main>
    <script type="module" src="src/main.ts"></script>
    <script type="module" src="src/script.ts"></script>
</body>

</html>
