<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory App</title>
</head>

<body>
    <main class="main-content">
        <header class="title">
            <h2>Settings</h2>
        </header>
        <section class="setting">
            <div class="setting-list">
                <h4 class="setting-list__title">Game themes</h4>
                <ul class="setting-list__content">
                    <li>Code vibes theme</li>
                    <li>Gaming theme</li>
                    <li>DA Projects theme</li>
                    <li>Foods theme</li>
                </ul>
            </div>

            <img class="img-themse" src="assets/img/settings/themes_example.svg" alt="Preview of the topic">
        </section>
        <aside class="player-settings">
            <div class="setting-list">
                <h4 class="setting-list__title">Choose Player</h4>
                <ul class="setting-list__content">
                    <li>orange</li>
                    <li>blue</li>
                </ul>
            </div>
            <div class="setting-list">
                <h4 class="setting-list__title">Bord size</h4>
                <ul class="setting-list__content">
                    <li>16 cards</li>
                    <li>24 cards</li>
                    <li>32 cards</li>
                </ul>
            </div>
        </aside>
        <footer class="game-play">
            <p>Game themes</p>
            <img src="assets/img/settings/border_yellow.svg" alt="">
            <p>Player</p>
            <img src="assets/img/settings/border_yellow.svg" alt="">
            <p>Bord size</p>
            <button class="btn btn-play">
                <img class="" src="assets/img/startscreen/stadia_controller.svg" alt="">
                <p class="">Start</p>
            </button>
        </footer>

    </main>
    <script type="module" src="src/main.ts"></script>
</body>

</html>
