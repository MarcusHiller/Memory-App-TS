<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory App</title>
</head>

<body>
    <main class="main-content">
        <header class="title">
            <h2>Settings</h2>
        </header>

        <section class="setting">
            <div class="setting-list">
                <div class="setting-list__header">
                    <img class="setting-list__img" src="assets/img/settings/palette.svg" alt="">
                    <h4 class="setting-list__title">Game themes</h4>
                </div>
                <ul class="setting-list__content">
                    <li class="setting-option">
                        <label class="setting-option__input-field" for="">
                            <input class="setting-option__input" type="radio">
                            <span class="setting-option__radio"></span>
                            <span class="setting-option__text">Code vibes theme</span>
                            <img class="setting-option--marker" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-option">
                        <label class="setting-option__input-field" for="">
                            <input class="setting-option__input" type="radio">
                            <span class="setting-option__radio"></span>
                            <span class="setting-option__text">Gaming theme</span>
                            <img class="setting-option--marker" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-option">
                        <label class="setting-option__input-field" for="">
                            <input class="setting-option__input" type="radio">
                            <span class="setting-option__radio"></span>
                            <span class="setting-option__text">DA Projects theme</span>
                            <img class="setting-option--marker" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-option">
                        <label class="setting-option__input-field" for="">
                            <input class="setting-option__input" type="radio">
                            <span class="setting-option__radio"></span>
                            <span class="setting-option__text">Foods theme</span>
                            <img class="setting-option--marker" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                </ul>
            </div>
            <img class="img-themse" src="assets/img/settings/themes_example.svg" alt="Preview of the topic">
        </section>

        <aside class="player-settings">
            <div class="setting-list">
                <div class="setting-list__header">
                    <img class="setting-list__img" src="assets/img/settings/chess_pawn.svg" alt="">
                    <h4 class="setting-list__title">Choose player</h4>
                </div>
                <ul class="setting-list__content">
                    <li class="setting-option">
                        <label class="setting-option__input-field" for="">
                            <input class="setting-option__input" type="radio">
                            <span class="setting-option__radio"></span>
                            <span class="setting-option__text">orange</span>
                            <img class="setting-option--marker" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-option">
                        <label class="setting-option__input-field" for="">
                            <input class="setting-option__input" type="radio">
                            <span class="setting-option__radio"></span>
                            <span class="setting-option__text">blue</span>
                            <img class="setting-option--marker" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                </ul>
            </div>
            <div class="setting-list">
                <div class="setting-list__header">
                    <img class="setting-list__img" src="assets/img/settings/style.svg" alt="">
                    <h4 class="setting-list__title">Border size</h4>
                </div>
                <ul class="setting-list__content">
                    <li class="setting-option">
                        <label class="setting-option__input-field" for="">
                            <input class="setting-option__input" type="radio">
                            <span class="setting-option__radio"></span>
                            <span class="setting-option__text">16 cards</span>
                            <img class="setting-option--marker" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-option">
                        <label class="setting-option__input-field" for="">
                            <input class="setting-option__input" type="radio">
                            <span class="setting-option__radio"></span>
                            <span class="setting-option__text">24 cards</span>
                            <img class="setting-option--marker" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                    <li class="setting-option">
                        <label class="setting-option__input-field" for="">
                            <input class="setting-option__input" type="radio">
                            <span class="setting-option__radio"></span>
                            <span class="setting-option__text">32 cards</span>
                            <img class="setting-option--marker" src="assets/img/settings/selection_marker_yellow.svg" alt="visible selection">
                        </label>
                    </li>
                </ul>
            </div>
        </aside>

        <footer class="game-play">
            <p class="game-play__text">Game themes</p>
            <img src="assets/img/settings/border_yellow.svg" alt="">
            <p class="game-play__text">Player</p>
            <img src="assets/img/settings/border_yellow.svg" alt="">
            <p class="game-play__text">Bord size</p>
            <button class="btn btn-start btn-start--disabled">
                <img class="btn-start__img" src="assets/img/settings/small_play.svg" alt="">
                <p class="btn-start__text">Start</p>
            </button>
        </footer>

    </main>
    <script type="module" src="src/main.ts"></script>
</body>

</html>
